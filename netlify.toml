# Netlify config — InnovateX 2026 (static site, no build step)

[build]
  publish = "."
  # no build command: the site is plain HTML/CSS/JS

# Static assets: cache for a week (faster repeat visits, low staleness risk)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML: always revalidate so content edits go live immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Baseline security headers (minor trust signal, applied site-wide)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
